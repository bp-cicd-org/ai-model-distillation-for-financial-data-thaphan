# =============================================================================
# AI Model Distillation for Financial Data — CI Pipeline
# =============================================================================
#
# DESIGN RATIONALE
# ================
#
# Why notebook-driven CI?
# -----------------------
# The Jupyter notebook (ai-model-distillation-financial-data.ipynb) IS the core
# deliverable of this project. It orchestrates every moving part: NeMo
# Microservices deployment, teacher model label generation, Data Flywheel job
# creation, student model fine-tuning, and inference evaluation. Running the
# notebook end-to-end is the most meaningful validation — if the notebook
# completes, the entire product works. A separate deploy-then-test approach
# would duplicate logic already expressed in the notebook, and any drift
# between the two would be a constant maintenance burden.
#
# Why NOT pytest?
# ---------------
# The generic Data Flywheel API tests (test_dfw_api.py) were originally designed
# for the base data-flywheel blueprint, not this financial-distillation project.
# They test CRUD operations on the DFW API, which is a small subset of what
# this project delivers. The notebook already exercises the full stack: model
# deployment, data loading, job submission, monitoring, customized model
# deployment, and inference. Adding pytest on top would be redundant coverage
# for significantly more maintenance cost. If project-specific API tests are
# needed in the future, they should be added as tagged cells in the notebook
# or as a separate test suite.
#
# Three-job architecture
# ----------------------
# The pipeline is split into three jobs:
#
#   1. Preflight (ubuntu-latest, ~2 min)
#      Validates secrets, file existence, and notebook structure on a cheap
#      runner. This fails fast before consuming expensive GPU time.
#
#   2. Notebook CI (GPU runner, ~90-180 min)
#      Executes the notebook end-to-end on a GPU-equipped ARC runner. This is
#      where the real work happens: minikube, NeMo, Docker Compose, model
#      training, and inference. Produces an HTML report as artifact.
#
#   3. Summary (ubuntu-latest, ~1 min)
#      Collects artifacts, generates a GitHub Step Summary, and sends an email
#      notification. Runs on a cheap runner to avoid wasting GPU capacity.
#
# Why the ARC runner can run minikube
# -----------------------------------
# The ARC (Actions Runner Controller) runner pod mounts the HOST node's Docker
# socket (/var/run/docker.sock). All Docker commands — including minikube's
# container creation — execute on the HOST's Docker daemon, not inside the pod.
# The host has nvidia-ctk configured, so --gpus=all passthrough works natively.
# Minikube's container is a sibling to the runner pod on the host, not nested.
# See RUNNER_ARCHITECTURE.md for the full architectural explanation and diagram.
#
# Why concurrency control?
# ------------------------
# Since containers run on the shared host Docker daemon (via socket mount),
# concurrent CI jobs on the same node would cause port conflicts (minikube,
# API 8000, ES 9200, etc.) and container name collisions. The concurrency
# group ensures only one notebook CI runs per branch at a time. New pushes
# cancel in-progress runs to free the GPU for the latest code.
#
# Why aggressive cleanup?
# -----------------------
# Because the runner pod accesses the HOST Docker daemon, containers created
# during CI persist on the host even after the pod is deleted. Without explicit
# cleanup (minikube delete, docker compose down, docker rm/prune), orphaned
# containers, networks, and volumes would accumulate and eventually cause
# failures in subsequent runs (port conflicts, disk exhaustion). A pre-cleanup
# step also runs BEFORE the notebook to remove stale resources from prior
# runs that may not have cleaned up properly (crash, timeout, cancellation).
#
# Notebook preprocessing
# ----------------------
# Four cells require CI-specific modifications:
#
#   Cell 5 (project_root): The original code computes project_root by walking
#   up parent directories, assuming a Brev Launchable directory layout. In CI,
#   the notebook runner's CWD is the repo root (after actions/checkout), so we
#   replace this with `project_root = Path.cwd()`.
#
#   Cell 7 (pip install): The ARC runner Python is externally-managed (Debian
#   policy). We replace uv with pip3 --break-system-packages.
#
#   Cell 9 (NGC API key): The original uses getpass() for interactive input.
#   In CI, we replace this with os.environ["NGC_API_KEY"], which is injected
#   via the notebook runner's -e flag.
#
#   Cell 10 (deploy-nmp.sh): The original runs with --progress, which hides
#   all stdout/stderr behind a progress bar (redirects to /tmp/nemo-deploy.log).
#   In CI we need full output for debugging, so we remove the flag.
#
# deploy-nmp.sh runtime patches (source file is NOT modified in repo)
# -------------------------------------------------------------------
# Patch 1 (systemd): start_minikube() registers a systemd service for
# auto-restart on reboot. ARC runners have no systemd (PID 1 = run.sh),
# so `systemctl daemon-reload` fatally fails under `set -euo pipefail`.
# We guard the three systemd lines with a `pidof systemd` check.
#
# Patch 2 (ImagePull tolerance): wait_for_pods() dies immediately on
# the first ErrImagePull/ImagePullBackOff. In practice, large NeMo images
# (500MB+) can show transient ErrImagePull while still being pulled; K8s
# retries with backoff and the pod often succeeds within minutes. We add
# a counter that tolerates up to 30 consecutive checks (5 min at 10s
# intervals) before dying. The counter resets when the error clears.
#
# Patch 3 (kube-rbac-proxy image): NeMo Operator Helm chart v25.10.0
# references gcr.io/kubebuilder/kube-rbac-proxy:v0.15.0, which was removed
# from GCR (migrated to registry.k8s.io). We inject a `kubectl set image`
# command after Helm install to correct the image reference before
# wait_for_pods runs.
#
# Patch 4 (Docker Hub rate-limit bypass): anonymous pulls from Docker Hub
# made by the minikube container's kubelet are rate-limited (run
# 26101017909 failed on `volcanosh/vc-scheduler:v1.9.0` and
# `bitnamilegacy/postgresql:17.2.0-debian-12-r1`). The host runner has a
# separate egress IP, so a preceding workflow step pre-pulls these images
# to the host docker. Patch 4 injects `minikube image load` calls right
# after `minikube addons enable ingress` so the images are present in the
# cluster's image store before `kubectl apply volcano-dev.yaml` and the
# NeMo helm install reference them. Best-effort: host pulls can also fail,
# in which case Patch 2's tolerance loop is the safety net.
#
# We preprocess (rewrite) these cells rather than skipping them, because
# subsequent cells depend on the variables they define or the side effects
# they produce (project_root, dependencies, NGC_API_KEY, minikube cluster).
#
# Skipped cells
# -------------
# Cells are skipped only when they are: (a) unnecessary in CI (git clone when
# we already have a checkout), (b) Brev-specific features (port forwarding,
# external URLs), or (c) optional extended runs (10K/25K continuous improvement
# jobs that add 30-60 min without testing new code paths). The 5K flywheel
# job is kept as it validates the complete pipeline.
#
# IMPORTANT: Cell indices are 0-based and tied to the current notebook version.
# If cells are added or removed upstream, the skip list and preprocessing
# indices MUST be updated. Run the following to dump the cell map:
#
#   python3 -c "
#   import json
#   with open('notebooks/ai-model-distillation-financial-data.ipynb') as f:
#       nb = json.load(f)
#   for i, c in enumerate(nb['cells']):
#       src = ''.join(c['source'])[:100].replace('\n', ' | ')
#       print(f'Cell {i:3d} [{c[\"cell_type\"]:8s}] {src}')
#   "
#
# =============================================================================
# Pipeline Flow
# =============================================================================
#
#   Preflight (ubuntu-latest)  ──►  Notebook CI (GPU)  ──►  Summary (ubuntu)
#        ~2 min                       ~90-180 min              ~1 min
#
#   Notebook execution phases (inside the notebook):
#     Cell 10:    deploy-nmp.sh → Minikube + Helm + NeMo Microservices
#     Cell 13-40: Teacher model deployment → Label generation → Cleanup
#     Cell 47-49: Docker Compose → Data Flywheel services
#     Cell 52-64: Data loading → Elasticsearch ingestion
#     Cell 67-78: Flywheel job submission → Monitoring (5K run)
#     Cell 89-102: Customized model deployment → Inference → Evaluation
#
# =============================================================================
# Hardware Requirements
# =============================================================================
# | Resource       | Minimum Requirement                          |
# |----------------|----------------------------------------------|
# | GPU            | 2x NVIDIA A100/H100/H200/B200 GPUs          |
# | Disk Space     | At least 200 GB                              |
# | Memory         | Recommended 64 GB+                           |
# | GPU Driver     | >= 560.35.03                                 |
#
# =============================================================================
# Required Secrets
# =============================================================================
# | Secret           | Required | Description                              |
# |------------------|----------|------------------------------------------|
# | NVIDIA_API_KEY   | Yes      | NVIDIA API Key for hosted NIM services   |
# | NGC_API_KEY      | Yes      | NGC API Key for container registry       |
# | MONGO_USERNAME   | Yes      | MongoDB root username                    |
# | MONGO_PASSWORD   | Yes      | MongoDB root password                    |
# | REDIS_PASSWORD   | Yes      | Redis password                           |
# | HF_TOKEN         | No       | Huggingface token (optional)             |
# | SMTP_USERNAME    | No       | Gmail for email notifications            |
# | SMTP_PASSWORD    | No       | Gmail app-specific password for SMTP     |
#
# =============================================================================
# Notebook Cell Skip List (0-based indices)
# =============================================================================
# |  Cell | Reason                                                   |
# |-------|----------------------------------------------------------|
# |     3 | git clone — repo already checked out by actions/checkout |
# |    45 | Self-hosted path setup (commented-out block, no-op)       |
# |    81 | Optional: submit 10K flywheel job (continuous improvement)|
# |    83 | Optional: monitor 10K job                                |
# |    85 | Optional: submit 25K flywheel job                        |
# |    87 | Optional: monitor 25K job                                |
# |   104 | Download LoRA adapters (Brev-specific)                   |
# |   106 | kubectl port-forward (Brev-specific)                     |
# |   108 | External URL inference test (Brev-specific)              |
#
# Preprocessed (rewritten, NOT skipped):
# |  Cell | Original                             | CI Replacement                     |
# |-------|--------------------------------------|------------------------------------|
# |     5 | project_root = notebook_dir.parent   | project_root = Path.cwd()          |
# |     7 | uv pip install -r ...                | pip3 --break-system-packages -r .. |
# |     9 | getpass("Enter NGC key")             | os.environ["NGC_API_KEY"]          |
# |    10 | deploy-nmp.sh --progress             | deploy-nmp.sh (no --progress)      |
#
# Additionally, scripts/deploy-nmp.sh is patched at runtime (source NOT modified):
# |  Patch | Original                             | CI Patch                           |
# |--------|--------------------------------------|------------------------------------|
# | 590-92 | systemctl daemon-reload / enable     | Guarded by `pidof systemd` check   |
# | 849-67 | die immediately on ErrImagePull      | Tolerate 30 checks (5 min) before  |
# |        |                                      | dying; reset counter when cleared  |
# | 764-69 | helm install → sleep 20 → end func   | After sleep 20, kubectl set image  |
# |        | (kube-rbac-proxy uses gcr.io which   | to fix kube-rbac-proxy image from  |
# |        | was removed from GCR)                | gcr.io → registry.k8s.io           |
# | ~570   | minikube addons enable ingress       | After ingress addon, minikube      |
# |        | (next step would pull Docker Hub     | image load for host-prepulled      |
# |        | images and hit anon rate-limit)      | volcanosh/* + bitnamilegacy images |
#
# =============================================================================

name: Blueprint QA

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "deploy/**"
      - "config/**"
      - "tests/**"
      - "notebooks/**"
      - "scripts/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/blueprint-qa.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "deploy/**"
      - "config/**"
      - "tests/**"
      - "notebooks/**"
      - "scripts/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/blueprint-qa.yml"
  workflow_dispatch:
    inputs:
      run_shared_qa:
        description: "Run shared DFW API tests from the QA image after the notebook completes"
        required: false
        default: true
        type: boolean
      keep_stack:
        description: "Keep Docker Compose / Minikube resources after the job (skip cleanup)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
  NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
  REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  ES_COLLECTION_NAME: flywheel
  TAG: "0.3.0"
  ENABLE_EMAIL_NOTIFICATION: true
  # Settings for the shared DFW API pytest layer (merged from prior
  # blueprint-qa.yml). Runs after the notebook finishes, against the
  # same Docker Compose stack the notebook brought up.
  DFW_API_URL: http://localhost:8000
  QA_TEST_IMAGE: nvcr.io/rw983xdqtcdp/auto_test_team/blueprint-github-test-image:latest
  TEST_REPORT_DIR: test_reports

jobs:
  # ===========================================================================
  # PREFLIGHT: Validate prerequisites on a cheap runner before burning GPU time
  # ===========================================================================
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    outputs:
      preflight_passed: ${{ steps.preflight.outputs.passed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preflight Checks
        id: preflight
        run: |
          echo "========================================"
          echo "  PREFLIGHT CHECKS"
          echo "========================================"
          echo ""

          FAILED=0

          # Check 1: Required secrets
          echo "--- [Check 1/5] Required Secrets ---"
          for SECRET_NAME in NVIDIA_API_KEY NGC_API_KEY MONGO_USERNAME MONGO_PASSWORD REDIS_PASSWORD; do
            VAL="${!SECRET_NAME}"
            if [ -z "$VAL" ]; then
              echo "FAIL: $SECRET_NAME is not set"
              FAILED=1
            else
              echo "PASS: $SECRET_NAME is set"
            fi
          done

          if [ -z "$HF_TOKEN" ]; then
            echo "WARN: HF_TOKEN is not set (optional)"
          else
            echo "PASS: HF_TOKEN is set"
          fi
          echo ""

          # Check 2: NGC Docker login (validates key, not just existence)
          echo "--- [Check 2/5] NGC Registry Access ---"
          if [ -n "$NGC_API_KEY" ]; then
            if echo "${NGC_API_KEY}" | docker login nvcr.io -u '$oauthtoken' --password-stdin 2>&1; then
              echo "PASS: NGC Docker login successful"
            else
              echo "FAIL: NGC Docker login failed (key may be invalid or expired)"
              FAILED=1
            fi
          else
            echo "SKIP: NGC_API_KEY not set (already flagged above)"
          fi
          echo ""

          # Check 3: Required files
          echo "--- [Check 3/5] Required Files ---"
          for FILE in \
            notebooks/ai-model-distillation-financial-data.ipynb \
            scripts/deploy-nmp.sh \
            deploy/docker-compose.yaml \
            notebooks/requirements.txt \
            config/config.yaml; do
            if [ -f "$FILE" ]; then
              echo "PASS: $FILE"
            else
              echo "FAIL: $FILE not found"
              FAILED=1
            fi
          done
          echo ""

          # Check 4: Notebook structure sanity
          echo "--- [Check 4/5] Notebook Sanity ---"
          CELL_COUNT=$(python3 -c "import json; nb=json.load(open('notebooks/ai-model-distillation-financial-data.ipynb')); print(len(nb['cells']))")
          echo "Notebook has $CELL_COUNT cells"
          if [ "$CELL_COUNT" -lt 50 ]; then
            echo "FAIL: Notebook has fewer cells than expected (possible corruption)"
            FAILED=1
          else
            echo "PASS: Cell count looks reasonable"
          fi
          echo ""

          # Check 5: Notebook runner available
          echo "--- [Check 5/5] Notebook Runner ---"
          git clone --depth 1 https://x-access-token:${{ github.token }}@github.com/bp-cicd-org/qa-tester.git _qa_tester
          if [ -f "_qa_tester/utils/notebook_runner/notebook_runner_nbclient.py" ]; then
            echo "PASS: notebook_runner_nbclient.py found"
          else
            echo "FAIL: notebook_runner_nbclient.py not found in qa-tester"
            FAILED=1
          fi
          rm -rf _qa_tester
          echo ""

          # Final
          echo "========================================"
          if [ $FAILED -eq 0 ]; then
            echo "ALL PREFLIGHT CHECKS PASSED"
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "PREFLIGHT CHECKS FAILED"
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "========================================"

  # ===========================================================================
  # NOTEBOOK CI: Full end-to-end notebook execution on GPU runner
  # ===========================================================================
  notebook-ci:
    name: Notebook Execution
    needs: preflight
    if: needs.preflight.outputs.preflight_passed == 'true'
    runs-on: arc-runner-set-oke-org-poc-5-gpu
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================================
      # Phase 1: GPU Runner Preflight — check & install ALL prerequisites
      # before any real work begins. Fail fast if anything critical is missing.
      # =====================================================================
      - name: "GPU Runner Preflight: Validate & Prepare Environment"
        run: |
          echo "========================================"
          echo "  GPU RUNNER PREFLIGHT"
          echo "========================================"
          FAILED=0
          mkdir -p "$HOME/.local/bin"
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          # --- Runner Info ---
          echo ""
          echo "--- [Info] Runner Environment ---"
          echo "Hostname: $(hostname)"
          echo "Kernel:   $(uname -r)"
          echo "User:     $(whoami) (uid=$(id -u))"
          echo "Disk:     $(df -BG / | awk 'NR==2 {print $4}') available"
          echo "Memory:   $(free -h | awk 'NR==2 {print $7}') available"

          # --- [1/9] Docker ---
          echo ""
          echo "--- [1/9] Docker ---"
          if command -v docker &>/dev/null; then
            DOCKER_VER=$(docker version --format '{{.Server.Version}}' 2>/dev/null || echo "0")
            echo "Docker version: $DOCKER_VER"
            if [[ "$(printf '%s\n' "27.0.0" "$DOCKER_VER" | sort -V | head -n1)" == "27.0.0" ]]; then
              echo "PASS: Docker >= 27.0.0"
            else
              echo "FAIL: Docker >= 27.0.0 required (found $DOCKER_VER)"
              FAILED=1
            fi
            echo "Compose: $(docker compose version 2>/dev/null || echo 'not found')"
          else
            echo "FAIL: Docker not found"
            FAILED=1
          fi

          # --- [2/9] GPU Access ---
          echo ""
          echo "--- [2/9] GPU Access (via Docker) ---"
          GPU_INFO=$(docker run --rm --gpus all nvidia/cuda:12.2.0-base-ubuntu22.04 \
            nvidia-smi --query-gpu=index,name,memory.total,driver_version \
            --format=csv,noheader 2>&1) || true
          GPU_COUNT=$(echo "$GPU_INFO" | grep -c "," || echo "0")
          if [ "$GPU_COUNT" -ge 2 ]; then
            echo "$GPU_INFO"
            echo "PASS: $GPU_COUNT GPUs accessible (>= 2 required)"
          else
            echo "FAIL: Need >= 2 GPUs, found $GPU_COUNT"
            echo "$GPU_INFO"
            FAILED=1
          fi

          # --- [3/9] nvidia-ctk ---
          echo ""
          echo "--- [3/9] NVIDIA Container Toolkit (nvidia-ctk) ---"
          if command -v nvidia-ctk &>/dev/null; then
            echo "PASS: nvidia-ctk $(nvidia-ctk --version 2>&1 | head -1)"
          else
            echo "WARN: nvidia-ctk not on PATH — attempting install..."
            curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
              | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg 2>/dev/null
            curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
              | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' \
              | sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list > /dev/null 2>&1
            sudo apt-get update -qq 2>/dev/null && sudo apt-get install -y -qq nvidia-container-toolkit 2>/dev/null
            if command -v nvidia-ctk &>/dev/null; then
              echo "PASS: nvidia-ctk installed — $(nvidia-ctk --version 2>&1 | head -1)"
            else
              echo "FAIL: nvidia-ctk could not be installed"
              echo "      deploy-nmp.sh requires nvidia-ctk for GPU passthrough to minikube"
              FAILED=1
            fi
          fi

          # --- [4/9] Python ---
          echo ""
          echo "--- [4/9] Python ---"
          if command -v python3 &>/dev/null; then
            echo "PASS: $(python3 --version)"
          else
            echo "FAIL: python3 not found"
            FAILED=1
          fi

          # --- [5/9] uv ---
          echo ""
          echo "--- [5/9] uv (Python package installer) ---"
          if command -v uv &>/dev/null; then
            echo "PASS: uv $(uv --version 2>&1)"
          else
            echo "Installing uv..."
            curl -LsSf https://astral.sh/uv/install.sh | sh
            if command -v uv &>/dev/null; then
              echo "PASS: uv installed — $(uv --version 2>&1)"
            else
              echo "FAIL: uv could not be installed"
              FAILED=1
            fi
          fi

          # --- [6/9] jq & yq ---
          echo ""
          echo "--- [6/9] jq & yq ---"
          for tool in jq yq; do
            if command -v "$tool" &>/dev/null; then
              echo "PASS: $tool already at $(command -v $tool)"
            else
              echo "Installing $tool..."
              case "$tool" in
                jq)
                  curl -fsSL -o "$HOME/.local/bin/jq" \
                    https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64
                  chmod +x "$HOME/.local/bin/jq"
                  ;;
                yq)
                  curl -fsSL -o "$HOME/.local/bin/yq" \
                    https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
                  chmod +x "$HOME/.local/bin/yq"
                  ;;
              esac
              if command -v "$tool" &>/dev/null; then
                echo "PASS: $tool installed — $($tool --version 2>&1 | head -1)"
              else
                echo "FAIL: $tool could not be installed"
                FAILED=1
              fi
            fi
          done

          # --- [7/9] huggingface-cli ---
          # deploy-nmp.sh accepts either the CLI binary or the importable
          # Python module. On ARC runners /usr/local/bin is read-only, so pip
          # installs the module but can't write the CLI script. We mirror
          # deploy-nmp.sh's own fallback: CLI binary OR importable module.
          echo ""
          echo "--- [7/9] huggingface-cli ---"
          if command -v huggingface-cli &>/dev/null; then
            echo "PASS: huggingface-cli at $(command -v huggingface-cli)"
          elif python3 -c "import huggingface_hub" 2>/dev/null; then
            echo "PASS: huggingface_hub module already importable"
          else
            echo "Installing huggingface_hub..."
            pip3 install --break-system-packages huggingface_hub 2>&1 || true
            export PATH="$HOME/.local/bin:$PATH"
            if command -v huggingface-cli &>/dev/null; then
              echo "PASS: huggingface-cli installed"
            elif python3 -c "import huggingface_hub" 2>/dev/null; then
              echo "PASS: huggingface_hub module installed (CLI not on PATH, but deploy-nmp.sh accepts module)"
            else
              echo "FAIL: huggingface_hub could not be installed"
              echo "      deploy-nmp.sh requires huggingface-cli or importable huggingface_hub module"
              FAILED=1
            fi
          fi

          # --- [8/9] NGC Docker Login ---
          echo ""
          echo "--- [8/9] NGC Docker Registry ---"
          if echo "${NGC_API_KEY}" | docker login nvcr.io -u '$oauthtoken' --password-stdin 2>&1; then
            echo "PASS: NGC Docker login successful"
          else
            echo "FAIL: NGC Docker login failed"
            FAILED=1
          fi

          # --- [9/9] Disk Space ---
          echo ""
          echo "--- [9/9] Disk Space ---"
          FREE_GB=$(df -BG / | awk 'NR==2 {gsub(/G/,""); print $4}')
          if [ "$FREE_GB" -ge 100 ]; then
            echo "PASS: ${FREE_GB}G free (>= 100G required)"
          else
            echo "WARN: Only ${FREE_GB}G free — may run out during deployment"
          fi

          # --- Final Verdict ---
          echo ""
          echo "========================================"
          if [ $FAILED -eq 0 ]; then
            echo "  ALL GPU RUNNER PREFLIGHT CHECKS PASSED"
          else
            echo "  GPU RUNNER PREFLIGHT FAILED"
            echo "  Aborting — fix the issues above before retrying."
            exit 1
          fi
          echo "========================================"

      # =====================================================================
      # Phase 2: Notebook Runner Setup
      # =====================================================================
      - name: Download Notebook Runner
        run: |
          git clone --depth 1 https://x-access-token:${{ github.token }}@github.com/bp-cicd-org/qa-tester.git _qa_tester
          cp _qa_tester/utils/notebook_runner/notebook_runner_nbclient.py .
          rm -rf _qa_tester
          chmod +x notebook_runner_nbclient.py

      - name: Install Notebook Dependencies
        run: |
          pip install --break-system-packages --upgrade pip
          pip install --break-system-packages ipykernel nbclient nbformat jupyter nbconvert
          python3 -m ipykernel install --user --name python3 --display-name "Python 3"

      # =====================================================================
      # Phase 3: Pre-configure for CI
      # =====================================================================
      - name: Create Environment Files
        run: |
          # Build .env with echo (not heredoc) to guarantee no leading whitespace.
          # Docker Compose .env parser is strict about KEY=VALUE format.
          # ~/.env  — sourced by notebook cell 49 before docker compose up.
          # deploy/.env — picked up by Docker Compose automatically.
          {
            echo "MONGO_USERNAME=${MONGO_USERNAME}"
            echo "MONGO_PASSWORD=${MONGO_PASSWORD}"
            echo "REDIS_PASSWORD=${REDIS_PASSWORD}"
            echo "NVIDIA_API_KEY=${NVIDIA_API_KEY}"
            echo "NGC_API_KEY=${NGC_API_KEY}"
            echo "LLM_JUDGE_API_KEY=${NVIDIA_API_KEY}"
            echo "EMB_API_KEY=${NVIDIA_API_KEY}"
            echo "HF_TOKEN=${HF_TOKEN}"
            echo "ES_COLLECTION_NAME=${ES_COLLECTION_NAME}"
            echo "TAG=${TAG}"
            echo "COMPOSE_PROFILES=mlflow"
          } > ~/.env

          cp ~/.env deploy/.env

      - name: Preprocess Notebook for CI
        run: |
          python3 << 'PREPROCESS'
          import json

          nb_path = 'notebooks/ai-model-distillation-financial-data.ipynb'
          with open(nb_path) as f:
              nb = json.load(f)

          # Cell 5: Fix project_root for CI and preserve other variables
          # that later cells depend on.
          #
          # Original cell 5 walks up parent dirs assuming the Brev Launchable
          # layout (notebook_dir.parent / 'ai-model-distillation-for-financial-data').
          # In CI, notebook_runner CWD = repo root (after actions/checkout), so
          # project_root is just Path.cwd().
          #
          # IMPORTANT: original cell 5 also defines `data_dir = project_root /
          # "data"` which is later referenced by cell 60. Earlier versions of
          # this patch dropped that line, which surfaced as a NameError on
          # cell 60 ("name 'data_dir' is not defined", run 26094142383). Keep
          # data_dir here so downstream cells stay self-contained.
          nb['cells'][5]['source'] = [
              'from pathlib import Path\n',
              'import os\n',
              '\n',
              'project_root = Path.cwd()\n',
              'data_dir = project_root / "data"\n',
              'data_dir.mkdir(parents=True, exist_ok=True)\n',
              'print(f"Project root: {project_root}")\n',
              'print(f"Data dir:     {data_dir}")\n',
          ]

          # Cell 7: Replace uv pip install with pip3 --break-system-packages.
          # ARC runner Python is externally-managed (Debian policy). Both
          # `uv pip install --system` and plain `pip3 install` refuse to work.
          # --break-system-packages is the only way to install into system
          # site-packages on this runner.
          nb['cells'][7]['source'] = [
              '!pip3 install --break-system-packages -r notebooks/requirements.txt -q\n',
          ]

          # Cell 9: Replace interactive getpass() with env var.
          # The -e flag on notebook_runner injects NGC_API_KEY into the kernel
          # environment; this cell just reads it into a Python variable.
          nb['cells'][9]['source'] = [
              'import os\n',
              '\n',
              'NGC_API_KEY = os.environ["NGC_API_KEY"]\n',
              'os.environ["NGC_API_KEY"] = NGC_API_KEY\n',
              'print(f"NGC_API_KEY is set ({len(NGC_API_KEY)} chars)")\n',
          ]

          # Cell 10: Remove --progress flag from deploy-nmp.sh.
          # In CI we need full stdout/stderr for debugging; --progress hides
          # all output behind a progress bar and redirects to /tmp/nemo-deploy.log.
          cell10_src = ''.join(nb['cells'][10]['source'])
          nb['cells'][10]['source'] = [
              cell10_src.replace('./scripts/deploy-nmp.sh --progress',
                                 './scripts/deploy-nmp.sh')
          ]

          # Cell 15: Resolve the dataset placeholder.
          # Notebook ships with a TODO placeholder ("<<REPLACE WITH DATASET
          # FROM HUGGINGFACE>>") that's meant to be filled in by the user.
          # In CI we substitute the dataset name referenced in the adjacent
          # markdown cell so notebook execution can proceed unattended.
          # Source notebook is untouched; this patch lives only in CI.
          cell15_src = ''.join(nb['cells'][15]['source'])
          nb['cells'][15]['source'] = [
              cell15_src.replace('<<REPLACE WITH DATASET FROM HUGGINGFACE>>',
                                 'ic-fspml/stock_news_sentiment')
          ]

          # Cell 30: Bound the teacher-model label generation for CI.
          # The notebook calls process_dataset(num_samples=None) which
          # classifies every headline in the dataset via the 70B teacher
          # NIM. On a single-node Minikube with 5 GPUs that exceeds the
          # 3600s per-cell timeout. For CI we want a smoke test of the
          # label-gen pipeline, not a full production run, so we cap.
          #
          # 200 (not 100) is chosen because the downstream flywheel job
          # splits the labeled set into eval+val+train using config/
          # config.yaml's data_split_config. sklearn's train_test_split
          # requires test_size < n_samples; with eval_size=100 (after
          # the runtime patch we drop to 20 in the workflow step
          # "Patch config.yaml for CI Environment") and stratification
          # dropping ~1 sample per rare class, 200 leaves enough
          # headroom for meaningful fine-tune (~160 train samples).
          # See run 26095886415 for the prior failure with 100 samples.
          cell30_src = ''.join(nb['cells'][30]['source'])
          nb['cells'][30]['source'] = [
              cell30_src.replace('num_samples=None, concurrent=200',
                                 'num_samples=200, concurrent=200')
          ]

          # Cell 98: Bound the post-fine-tune sanity check for CI.
          # Same reasoning as cell 30 — the validation pass over the full
          # dataset against the customized model would also exceed the
          # per-cell timeout. Cap at 100 samples by slicing
          # validation_dataset['train'] before passing it in.
          cell98_src = ''.join(nb['cells'][98]['source'])
          nb['cells'][98]['source'] = [
              cell98_src.replace(
                  'process_dataset(validation_dataset,ft_model_name, concurrent=200)',
                  'process_dataset(validation_dataset,ft_model_name, num_samples=100, concurrent=200)'
              )
          ]

          with open(nb_path, 'w') as f:
              json.dump(nb, f, indent=1)

          print(f"Preprocessed {nb_path}")
          print(f"  Cell 5:  project_root = Path.cwd()")
          print(f"  Cell 7:  pip3 --break-system-packages")
          print(f"  Cell 9:  getpass() -> os.environ")
          print(f"  Cell 10: deploy-nmp.sh without --progress")
          print(f"  Cell 15: dataset placeholder -> ic-fspml/stock_news_sentiment")
          print(f"  Cell 30: teacher labeling num_samples=None -> 100 (CI smoke)")
          print(f"  Cell 98: validation sanity check num_samples=None -> 100 (CI smoke)")
          PREPROCESS

      - name: Patch deploy-nmp.sh for CI Environment
        run: |
          SCRIPT="scripts/deploy-nmp.sh"
          echo "Applying runtime patches to $SCRIPT (source file is NOT modified in repo)"
          echo ""

          python3 << 'PATCH'
          with open('scripts/deploy-nmp.sh') as f:
              content = f.read()

          patches_applied = []

          # ── Patch 1: Guard systemd service registration ──────────────
          # ARC runner has no systemd (PID 1 = run.sh). The systemd unit
          # is only for auto-restart on reboot — irrelevant in CI.
          # Wrap the tee + systemctl lines in: if pidof systemd; then ... fi

          old = (
              '  # Enable minikube to resume on restart\n'
              '  echo """[Unit]'
          )
          new = (
              '  # Enable minikube to resume on restart\n'
              '  # CI-PATCH: Skip systemd when not PID 1\n'
              '  if pidof systemd >/dev/null 2>&1; then\n'
              '  echo """[Unit]'
          )
          if old in content:
              content = content.replace(old, new, 1)
              old_tail = (
                  '  maybe_sudo systemctl daemon-reload\n'
                  '  maybe_sudo systemctl enable minikube\n'
                  '}'
              )
              new_tail = (
                  '  maybe_sudo systemctl daemon-reload\n'
                  '  maybe_sudo systemctl enable minikube\n'
                  '  else\n'
                  '    log "No systemd detected (CI/container) — skipping minikube service registration"\n'
                  '  fi\n'
                  '}'
              )
              content = content.replace(old_tail, new_tail, 1)
              patches_applied.append("systemd guard")

          # ── Patch 2: ImagePull tolerance in wait_for_pods() ──────────
          # Original: die immediately on first ErrImagePull/ImagePullBackOff.
          # Problem:  Large NeMo images (500MB+) can show transient ErrImagePull
          #           while still pulling. K8s retries with backoff; the pod
          #           often succeeds within a few minutes.
          # Fix:      Tolerate up to 30 consecutive checks (30 × 10s = 5 min)
          #           before dying. Reset counter when error clears.

          # 2a: Insert counter variable before the while loop
          old_loop = (
              '  while true; do\n'
              '    # Get current pod statuses'
          )
          new_loop = (
              '  local _ci_imgpull_count=0\n'
              '  local _CI_IMGPULL_MAX=30  # CI-PATCH: tolerate 30 checks (5 min)\n'
              '\n'
              '  while true; do\n'
              '    # Get current pod statuses'
          )
          if old_loop in content:
              content = content.replace(old_loop, new_loop, 1)

              # 2b: Replace the immediate-die block with a counter-based one
              old_imgpull = (
                  '    # --- Premature exit for ImagePull errors ---\n'
                  '    local image_pull_errors\n'
                  '    image_pull_errors=$(echo "$pod_statuses" | grep -E "ImagePullBackOff|ErrImagePull" || true)\n'
                  '    if [[ -n "$image_pull_errors" ]]; then\n'
                  '      err "Detected ImagePull errors!"\n'
                  '      echo "$image_pull_errors" >&2 # Show the specific pods with errors\n'
                  '      warn "Gathering diagnostics for pods with ImagePull errors..."\n'
                  '      # Extract pod names with errors and collect diagnostics\n'
                  '      local error_pods=($(echo "$image_pull_errors" | awk \'{print $1}\'))\n'
                  '      local err_dir="nemo-errors-$(date +%s)"\n'
                  '      mkdir -p "$err_dir" || warn "Could not create error directory: $err_dir"\n'
                  '      for pod in "${error_pods[@]}"; do\n'
                  '        collect_pod_diagnostics "$pod" "$NAMESPACE" "$err_dir"\n'
                  '      done\n'
                  '      # Restore trap before dying\n'
                  '      eval "$old_err_trap"\n'
                  '      trap - SIGINT\n'
                  '      die "Exiting due to ImagePull errors. Diagnostics collected to $err_dir (if possible)."\n'
                  '    fi\n'
                  '    # --- End ImagePull check ---'
              )
              new_imgpull = (
                  '    # --- ImagePull error check (CI-PATCHED: tolerance) ---\n'
                  '    local image_pull_errors\n'
                  '    image_pull_errors=$(echo "$pod_statuses" | grep -E "ImagePullBackOff|ErrImagePull" || true)\n'
                  '    if [[ -n "$image_pull_errors" ]]; then\n'
                  '      _ci_imgpull_count=$((_ci_imgpull_count + 1))\n'
                  '      warn "ImagePull errors detected (check $_ci_imgpull_count/$_CI_IMGPULL_MAX):"\n'
                  '      echo "$image_pull_errors" >&2\n'
                  '      if (( _ci_imgpull_count >= _CI_IMGPULL_MAX )); then\n'
                  '        err "ImagePull errors persisted for $_ci_imgpull_count consecutive checks!"\n'
                  '        warn "Gathering diagnostics for pods with ImagePull errors..."\n'
                  '        local error_pods=($(echo "$image_pull_errors" | awk \'{print $1}\'))\n'
                  '        local err_dir="nemo-errors-$(date +%s)"\n'
                  '        mkdir -p "$err_dir" || warn "Could not create error directory: $err_dir"\n'
                  '        for pod in "${error_pods[@]}"; do\n'
                  '          collect_pod_diagnostics "$pod" "$NAMESPACE" "$err_dir"\n'
                  '        done\n'
                  '        eval "$old_err_trap"\n'
                  '        trap - SIGINT\n'
                  '        die "Exiting due to persistent ImagePull errors. Diagnostics collected to $err_dir (if possible)."\n'
                  '      fi\n'
                  '    else\n'
                  '      _ci_imgpull_count=0\n'
                  '    fi\n'
                  '    # --- End ImagePull check ---'
              )
              content = content.replace(old_imgpull, new_imgpull, 1)
              patches_applied.append("ImagePull tolerance (30 checks / 5 min)")

          # ── Patch 3: Fix deprecated kube-rbac-proxy image registry ───
          # NeMo Operator Helm chart v25.10.0 references
          #   gcr.io/kubebuilder/kube-rbac-proxy:v0.15.0
          # which was removed from GCR (migrated to registry.k8s.io).
          # We inject a `kubectl set image` after `helm install` + `sleep 20`
          # to correct the image reference before wait_for_pods runs.

          old_sleep = (
              '    --password=$NGC_API_KEY\n'
              '\n'
              '  sleep 20\n'
              '}'
          )
          new_sleep = (
              '    --password=$NGC_API_KEY\n'
              '\n'
              '  sleep 20\n'
              '\n'
              '  # CI-PATCH: Fix deprecated gcr.io kube-rbac-proxy image.\n'
              '  # gcr.io/kubebuilder/kube-rbac-proxy:v0.15.0 was removed from GCR;\n'
              '  # the canonical location is now registry.k8s.io.\n'
              '  if kubectl get deployment nemo-nemo-operator-controller-manager -n "$NAMESPACE" &>/dev/null; then\n'
              '    log "Fixing kube-rbac-proxy image reference (gcr.io → registry.k8s.io)..."\n'
              '    kubectl set image deployment/nemo-nemo-operator-controller-manager \\\n'
              '      kube-rbac-proxy=registry.k8s.io/kubebuilder/kube-rbac-proxy:v0.15.0 \\\n'
              '      -n "$NAMESPACE" || warn "Could not patch kube-rbac-proxy image"\n'
              '  fi\n'
              '}'
          )
          if old_sleep in content:
              content = content.replace(old_sleep, new_sleep, 1)
              patches_applied.append("kube-rbac-proxy image fix (gcr.io → registry.k8s.io)")

          # ── Patch 4: Load host-prepulled Docker Hub images into minikube ─
          # The kubelet inside the minikube container has its own docker
          # daemon and re-pulls every image from Docker Hub anonymously,
          # which hits the rate limit (see run 26101017909). The host runner
          # has separate egress, so the workflow's "Pre-pull Docker Hub
          # Images" step pulled `volcanosh/*` and `bitnamilegacy/postgresql`
          # to the host. Here we inject `minikube image load` right after
          # `minikube addons enable ingress` so those images are present in
          # the cluster's image store before `kubectl apply volcano-dev.yaml`
          # and the NeMo helm install spin up pods that reference them.

          old_ingress = (
              '  log "Enabling ingress addon..."\n'
              '  minikube addons enable ingress\n'
          )
          new_ingress = (
              '  log "Enabling ingress addon..."\n'
              '  minikube addons enable ingress\n'
              '\n'
              '  # CI-PATCH: Load host-prepulled Docker Hub images into minikube\n'
              '  # to bypass anonymous Docker Hub rate-limiting from the minikube\n'
              '  # container. Best-effort: if the host pull failed earlier, the\n'
              '  # kubelet will still try (and Patch 2 tolerates transient errors).\n'
              '  for _ci_img in \\\n'
              '    volcanosh/vc-scheduler:v1.9.0 \\\n'
              '    volcanosh/vc-controller-manager:v1.9.0 \\\n'
              '    volcanosh/vc-webhook-manager:v1.9.0 \\\n'
              '    bitnamilegacy/postgresql:17.2.0-debian-12-r1; do\n'
              '    if docker image inspect "$_ci_img" >/dev/null 2>&1; then\n'
              '      log "CI: loading $_ci_img into minikube..."\n'
              '      minikube image load "$_ci_img" \\\n'
              '        || warn "CI: minikube image load failed for $_ci_img"\n'
              '    else\n'
              '      warn "CI: $_ci_img not on host (pre-pull may have failed)"\n'
              '    fi\n'
              '  done\n'
          )
          if old_ingress in content:
              content = content.replace(old_ingress, new_ingress, 1)
              patches_applied.append("minikube image load (Docker Hub rate-limit bypass)")

          with open('scripts/deploy-nmp.sh', 'w') as f:
              f.write(content)

          print(f"Applied {len(patches_applied)} patch(es):")
          for p in patches_applied:
              print(f"  ✓ {p}")
          if not patches_applied:
              print("  WARNING: No patches matched — deploy-nmp.sh may have changed upstream")
          PATCH

          echo ""
          echo "Verifying patches:"
          grep -cn "pidof systemd" "$SCRIPT" | xargs -I{} echo "  ✓ systemd guard: {} match(es)"
          grep -cn "_CI_IMGPULL_MAX" "$SCRIPT" | xargs -I{} echo "  ✓ ImagePull tolerance: {} match(es)"
          grep -cn "registry.k8s.io/kubebuilder" "$SCRIPT" | xargs -I{} echo "  ✓ kube-rbac-proxy fix: {} match(es)"
          grep -cn "CI: loading" "$SCRIPT" | xargs -I{} echo "  ✓ minikube image load: {} match(es)"

      # =====================================================================
      # Phase 3.5: Pre-Cleanup — Remove stale containers from prior runs
      # ARC runners share the host Docker daemon. If a previous CI run's
      # cleanup was incomplete (crash, timeout, cancellation), orphaned
      # minikube containers/networks will conflict with the new run.
      # =====================================================================
      - name: Patch config.yaml for CI Environment
        run: |
          # Same pattern as the deploy-nmp.sh patch above: the dev team's
          # config/config.yaml in the repo is untouched in git. We mutate
          # the checked-out copy on the runner only for this workflow run.
          #
          # Why: config/config.yaml ships with eval_size=100 (production
          # default). The Preprocess Notebook for CI step caps teacher-
          # model label generation at 200 samples (cell 30); the flywheel
          # then asks sklearn.train_test_split for test_size=100 from
          # ~199 stratified samples. That works, but leaves very little
          # for training (~80 train samples). Lowering eval_size to 20
          # rebalances the split to ~160 train / 18 val / 20 eval, which
          # is the minimum for the LoRA fine-tune step to produce a
          # customized model that downstream cells (89-103) can read.
          # See run 26095886415 for the prior failure where eval_size=
          # 100 against n=99 samples crashed the flywheel job.
          #
          # We also lower training_config.batch_size from 64 to 8. The
          # customizer's NeMo trainer enforces global_batch_size <= number
          # of validation samples, and with the CI 200-sample dataset the
          # post-split val_size lands at ~18 (val_ratio=0.1 of train,
          # minus stratification rounding). 64 > 18 made the customizer
          # abort with "Batch size 64 cannot be larger than number of
          # samples for validation 18" (run 26110670947 customizer log),
          # which left ft_model_name pointing at a job that never
          # produced an adapter; cell 98's inference call then hit a
          # KeyError: 'choices' because the NIM responded with an error
          # body. 8 is a comfortable power of two below the val floor
          # and matches the typical CI-smoke batch size for LoRA SFT.

          # Why surgical regex instead of yaml.safe_dump round-trip:
          # An earlier version of this step parsed the YAML with PyYAML and
          # wrote it back with safe_dump. That reformatted the `nims:` block
          # to PyYAML's default style (list items flush-left at column 0).
          # Notebook cell 47 then runs a regex (?ms)^(nims:[\s\S]*?)(?=^\S|\Z)
          # to swap the NIMs block. The negative lookahead matches the very
          # first flush-left `- model_name:` line, so the replacement only
          # consumes `nims:\n` and leaves the old list items as orphans
          # below the new ones -> duplicate keys -> YAML ParserError when
          # any later cell loads the config. (Seen in run 26097895803.)
          #
          # The fix is a surgical line-level substitution that only changes
          # the two integers we care about. Every byte of formatting -
          # indentation, blank lines, comments - is preserved as-is, so the
          # cell 47 regex behaves exactly as it did against the original
          # source file.
          python3 << 'PATCH_CFG'
          import re

          path = 'config/config.yaml'
          with open(path) as f:
              text = f.read()

          before = {}
          for key in ('eval_size', 'min_total_records', 'batch_size'):
              m = re.search(rf'(?m)^\s*{key}:\s*(\d+)', text)
              before[key] = m.group(1) if m else None

          text = re.sub(
              r'(?m)^(\s*eval_size:\s*)\d+(\s*(?:#.*)?)$',
              r'\g<1>20\g<2>',
              text,
          )
          text = re.sub(
              r'(?m)^(\s*min_total_records:\s*)\d+(\s*(?:#.*)?)$',
              r'\g<1>30\g<2>',
              text,
          )
          # training_config.batch_size: 64 -> 8.
          # `batch_size` only appears once at top-level under training_config
          # in this file (the LoRA / data_split blocks use other key names),
          # so a single line-anchored substitution is unambiguous and keeps
          # the same surgical, formatting-preserving style as the two patches
          # above.
          text = re.sub(
              r'(?m)^(\s*batch_size:\s*)\d+(\s*(?:#.*)?)$',
              r'\g<1>8\g<2>',
              text,
          )

          if (
              'eval_size: 20' not in text
              or 'min_total_records: 30' not in text
              or 'batch_size: 8' not in text
          ):
              raise SystemExit('config.yaml patch failed: target keys not rewritten')

          with open(path, 'w') as f:
              f.write(text)

          print(f"data_split_config.eval_size:         {before['eval_size']} -> 20")
          print(f"data_split_config.min_total_records: {before['min_total_records']} -> 30")
          print(f"training_config.batch_size:          {before['batch_size']} -> 8")
          print("config.yaml patched for CI (source file in git is unchanged).")
          PATCH_CFG

      # =====================================================================
      # Phase 3.6: Pre-pull Docker Hub images (rate-limit mitigation)
      # =====================================================================
      # Docker Hub aggressively rate-limits unauthenticated pulls. The pulls
      # that bite us in CI are made from INSIDE the minikube container (whose
      # docker daemon is separate from the host's). When the rate limit hits,
      # `volcano-scheduler` and the NeMo data-store `prepull-postgres-image`
      # job loop on ImagePullBackOff for ~5 min and the notebook deploy step
      # eventually gives up (see run 26101017909).
      #
      # We can't authenticate (no DOCKERHUB_TOKEN secret available), but the
      # HOST runner usually sits behind a different egress IP than minikube,
      # so it tends to have headroom while minikube is starved. We pull on
      # the host with retries, then `minikube image load` them into the
      # cluster's image store after `deploy-nmp.sh` calls `minikube start`
      # (see Patch 4 in the deploy-nmp.sh patch step above).
      #
      # If a host pull also fails, we don't abort — `minikube image load`
      # in the patched script is best-effort; the notebook will fall back to
      # the existing ImagePull tolerance loop (Patch 2). At least one of
      # the two layers usually succeeds, which is enough to unblock the run.
      - name: Pre-pull Docker Hub Images (rate-limit mitigation)
        run: |
          echo "========================================"
          echo "  PRE-PULL DOCKER HUB IMAGES"
          echo "========================================"
          IMAGES=(
            "docker.io/volcanosh/vc-scheduler:v1.9.0"
            "docker.io/volcanosh/vc-controller-manager:v1.9.0"
            "docker.io/volcanosh/vc-webhook-manager:v1.9.0"
            "docker.io/bitnamilegacy/postgresql:17.2.0-debian-12-r1"
          )
          for img in "${IMAGES[@]}"; do
            short="${img#docker.io/}"
            echo ""
            echo "--- Pulling $short ---"
            ok=0
            for attempt in 1 2 3 4 5; do
              if docker pull "$img" 2>&1 | tail -5; then
                ok=1
                # Tag the docker.io/... pull as the bare name so
                # `minikube image load` can find it under the same ref the
                # cluster manifests expect.
                docker tag "$img" "$short" 2>/dev/null || true
                echo "  OK on attempt $attempt"
                break
              fi
              wait=$((attempt * 30))
              echo "  attempt $attempt/5 failed — sleeping ${wait}s before retry"
              sleep "$wait"
            done
            if [ "$ok" -ne 1 ]; then
              echo "  WARN: could not pre-pull $short (in-cluster pull will retry via Patch 2 tolerance)"
            fi
          done
          echo ""
          echo "--- Pre-pulled images on host ---"
          docker images | grep -E "volcanosh|bitnamilegacy" || echo "(none)"

      - name: Pre-Cleanup Stale Docker Resources
        run: |
          echo "Cleaning up stale Docker resources from prior runs..."

          # 1. Try minikube CLI (may not be installed on fresh pod)
          minikube delete 2>/dev/null && echo "  Deleted stale minikube cluster" || echo "  No stale minikube CLI or cluster"

          # 2. Remove minikube containers by name (these live on the HOST Docker)
          for c in minikube minikube-preload-sidecar; do
            docker rm -f "$c" 2>/dev/null && echo "  Removed stale container: $c" || true
          done

          # 3. Remove any other minikube-labeled containers
          docker rm -f $(docker ps -aq --filter "label=created_by.minikube.sigs.k8s.io=true") 2>/dev/null && echo "  Removed minikube-labeled containers" || true

          # 4. Stop stale Docker Compose services (port conflicts: 8000, 9200, etc.)
          docker compose -f deploy/docker-compose.yaml down -v 2>/dev/null && echo "  Stopped stale compose services" || true

          # 5. Prune orphaned networks and volumes
          docker network prune -f 2>/dev/null || true
          docker volume prune -f 2>/dev/null || true

          echo "Pre-cleanup done."

      # =====================================================================
      # Phase 4: Execute Notebook
      # =====================================================================
      - name: Execute Notebook
        run: |
          echo "========================================"
          echo "  EXECUTING NOTEBOOK"
          echo "========================================"
          echo ""
          echo "Skip list: 3 45 81 83 85 87 104 106 108"
          echo "  3:   git clone (already checked out)"
          echo "  45:  self-hosted setup (commented-out block)"
          echo "  81:  optional 10K flywheel job"
          echo "  83:  optional 10K monitor"
          echo "  85:  optional 25K flywheel job"
          echo "  87:  optional 25K monitor"
          echo "  104: LoRA adapter download (Brev)"
          echo "  106: kubectl port-forward (Brev)"
          echo "  108: external URL inference (Brev)"
          echo ""

          python3 notebook_runner_nbclient.py \
            -f notebooks/ai-model-distillation-financial-data.ipynb \
            --output-dir notebook_output \
            --timeout 3600 \
            --skip-deps-check \
            --skip-cells 3 45 81 83 85 87 104 106 108 \
            -e NGC_API_KEY="${NGC_API_KEY}" \
            -e NVIDIA_API_KEY="${NVIDIA_API_KEY}" \
            -e MONGO_USERNAME="${MONGO_USERNAME}" \
            -e MONGO_PASSWORD="${MONGO_PASSWORD}" \
            -e REDIS_PASSWORD="${REDIS_PASSWORD}" \
            -e HF_TOKEN="${HF_TOKEN}" \
            -e ES_COLLECTION_NAME="${ES_COLLECTION_NAME}" \
            -e TAG="${TAG}"

          echo ""
          echo "Notebook execution completed."
          echo "Generated files:"
          ls -la notebook_output/

      # =====================================================================
      # Phase 5: Post-Notebook Validation
      # =====================================================================
      - name: Verify Service Health
        if: always()
        run: |
          echo "========================================"
          echo "  POST-NOTEBOOK SERVICE HEALTH CHECK"
          echo "========================================"
          echo ""

          HEALTH="PASS"

          # API Server
          echo "--- API Server (port 8000) ---"
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8000/api/jobs" 2>/dev/null || echo "000")
          if [ "$API_STATUS" = "200" ]; then
            echo "PASS: API Server (HTTP $API_STATUS)"
          else
            echo "FAIL: API Server (HTTP $API_STATUS)"
            HEALTH="FAIL"
          fi

          # Elasticsearch
          echo "--- Elasticsearch (port 9200) ---"
          ES_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:9200/_cluster/health" 2>/dev/null || echo "000")
          if [ "$ES_STATUS" = "200" ]; then
            echo "PASS: Elasticsearch (HTTP $ES_STATUS)"
          else
            echo "FAIL: Elasticsearch (HTTP $ES_STATUS)"
            HEALTH="FAIL"
          fi

          # Redis
          echo "--- Redis (port 6379) ---"
          REDIS_CONTAINER=$(docker ps -qf "name=redis" | head -1)
          if [ -n "$REDIS_CONTAINER" ] && docker exec "$REDIS_CONTAINER" redis-cli -a "$REDIS_PASSWORD" ping 2>/dev/null | grep -q "PONG"; then
            echo "PASS: Redis"
          else
            echo "FAIL: Redis"
            HEALTH="FAIL"
          fi

          # MongoDB
          echo "--- MongoDB (port 27017) ---"
          MONGO_CONTAINER=$(docker ps -qf "name=mongodb" | head -1)
          if [ -n "$MONGO_CONTAINER" ] && docker exec "$MONGO_CONTAINER" mongosh --eval "db.runCommand('ping').ok" --quiet -u "$MONGO_USERNAME" -p "$MONGO_PASSWORD" 2>/dev/null | grep -q "1"; then
            echo "PASS: MongoDB"
          else
            echo "FAIL: MongoDB"
            HEALTH="FAIL"
          fi

          # MLflow
          echo "--- MLflow (port 5000) ---"
          MLFLOW_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:5000/" 2>/dev/null || echo "000")
          if [ "$MLFLOW_STATUS" = "200" ]; then
            echo "PASS: MLflow (HTTP $MLFLOW_STATUS)"
          else
            echo "FAIL: MLflow (HTTP $MLFLOW_STATUS)"
            HEALTH="FAIL"
          fi

          echo ""
          echo "--- Container Status ---"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || true

          echo ""
          if [ "$HEALTH" = "PASS" ]; then
            echo "ALL SERVICES HEALTHY"
          else
            echo "SOME SERVICES UNHEALTHY (notebook may have failed at deployment step)"
            exit 1
          fi

      # =====================================================================
      # Phase 5b: Shared DFW API tests (merged from blueprint-qa.yml)
      # Runs the QA team's pytest suite from the shared QA image against the
      # Docker Compose stack the notebook brought up. Skipped if Verify
      # Service Health failed (stack not actually healthy) or if the user
      # passed workflow_dispatch input run_shared_qa=false.
      # =====================================================================
      - name: Run shared DFW API tests
        if: ${{ success() && (github.event_name != 'workflow_dispatch' || inputs.run_shared_qa) }}
        env:
          TEST_DOCKER_PULL_KEY: ${{ secrets.TEST_DOCKER_PULL_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "${TEST_REPORT_DIR}"
          # Prefer the dedicated pull key if provided; fall back to NGC_API_KEY
          # so personal-account setups still work.
          pull_key="${TEST_DOCKER_PULL_KEY:-${NGC_API_KEY}}"
          echo "${pull_key}" | docker login nvcr.io -u '$oauthtoken' --password-stdin
          docker pull "${QA_TEST_IMAGE}"

          docker run --rm --network host \
            -v "$(pwd)/${TEST_REPORT_DIR}:/app/reports" \
            -e DFW_API_URL="${DFW_API_URL}" \
            "${QA_TEST_IMAGE}" \
            pytest testcases/dfw/test_dfw_api.py \
              -m dfw \
              -k "not test_create_and_monitor_job_to_completion" \
              --dfw-api-url "${DFW_API_URL}" \
              --html=/app/reports/dfw-api-test.html \
              --self-contained-html \
              --disable-warnings \
              -v

      - name: Upload QA Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dfw-api-test-report
          path: test_reports/*.html
          if-no-files-found: ignore
          retention-days: 14

      # =====================================================================
      # Phase 6: Notebook Artifacts
      # =====================================================================
      - name: Upload Notebook HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: notebook-html-report
          path: notebook_output/*.html
          retention-days: 30

      - name: Upload Executed Notebook
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: executed-notebook
          path: notebook_output/*.ipynb
          retention-days: 30

      # =====================================================================
      # Phase 7: Cleanup
      # ALWAYS runs. Critical because containers live on the HOST (via Docker
      # socket mount) and will NOT be cleaned up when the runner pod dies.
      # =====================================================================
      - name: Collect Logs on Failure
        if: failure()
        run: |
          echo "========================================"
          echo "  COLLECTING LOGS FOR DEBUGGING"
          echo "========================================"
          echo ""
          echo "--- deploy-nmp.sh Log (/tmp/nemo-deploy.log) ---"
          if [ -f /tmp/nemo-deploy.log ]; then
            cat /tmp/nemo-deploy.log
          else
            echo "(log file not found — deploy-nmp.sh may not have started)"
          fi
          echo ""
          echo "--- Docker Compose Logs ---"
          docker compose -f deploy/docker-compose.yaml logs --tail=50 2>/dev/null || true
          echo ""
          echo "--- Minikube Logs ---"
          minikube logs --length=50 2>/dev/null || true
          echo ""
          echo "--- Kubernetes Pods ---"
          kubectl get pods -A 2>/dev/null || true
          echo ""
          echo "--- Failed Pod Logs ---"
          for pod in $(kubectl get pods --no-headers 2>/dev/null | grep -v Running | awk '{print $1}'); do
            echo "=== $pod ==="
            kubectl logs "$pod" --tail=20 2>/dev/null || true
          done

      - name: Cleanup
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || !inputs.keep_stack) }}
        run: |
          echo "========================================"
          echo "  CLEANUP"
          echo "========================================"
          docker compose -f deploy/docker-compose.yaml down -v 2>/dev/null || true
          minikube delete 2>/dev/null || true
          docker rm -f $(docker ps -aq) 2>/dev/null || true
          docker network prune -f 2>/dev/null || true
          docker volume prune -f 2>/dev/null || true
          docker rmi "${QA_TEST_IMAGE}" 2>/dev/null || true
          docker image prune -f 2>/dev/null || true
          echo "Cleanup completed."

  # ===========================================================================
  # SUMMARY: Collect results and notify (runs on cheap runner)
  # ===========================================================================
  summary:
    name: Summary & Notification
    needs: [preflight, notebook-ci]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: Generate Summary
        run: |
          echo "# AI Model Distillation CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Preflight | ${{ needs.preflight.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Notebook CI | ${{ needs.notebook-ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "artifacts" ]; then
            echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            find artifacts -type f \( -name "*.html" -o -name "*.ipynb" \) 2>/dev/null | while read f; do
              SIZE=$(du -h "$f" | cut -f1)
              echo "| $(basename "$f") | $SIZE |" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "No artifacts available." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Set Result Output
        id: set_result
        if: always()
        run: |
          if [ "${{ needs.preflight.result }}" == "success" ] && \
             [ "${{ needs.notebook-ci.result }}" == "success" ]; then
            echo "RESULT=PASS" >> $GITHUB_OUTPUT
          else
            echo "RESULT=FAIL" >> $GITHUB_OUTPUT
          fi

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@6e71c855c9a091d80a519621b9fd3e8d252ca40c
        if: always() && env.ENABLE_EMAIL_NOTIFICATION == 'true'
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Result: AI Model Distillation - ${{ steps.set_result.outputs.RESULT }}"
          to: Github-Action-Blueprint-QA@nvidia.com
          from: github-workflow-notification@gmail.com
          html_body: |
            <h2>AI Model Distillation for Financial Data - CI</h2>

            <p><strong>Repository:</strong> ${{ github.repository }}</p>
            <p><strong>Branch:</strong> ${{ github.ref_name }}</p>
            <p><strong>Commit:</strong> <code>${{ github.sha }}</code></p>
            <p><strong>Triggered by:</strong> ${{ github.actor }} (${{ github.event_name }})</p>
            <p><strong>Result:</strong>
              <span style="color: ${{ steps.set_result.outputs.RESULT == 'PASS' && 'green' || 'red' }}; font-weight: bold;">
                ${{ steps.set_result.outputs.RESULT }}
              </span>
            </p>

            <h3>Job Results</h3>
            <table border="1" cellpadding="5" cellspacing="0">
              <tr><th>Job</th><th>Status</th></tr>
              <tr><td>Preflight</td><td>${{ needs.preflight.result }}</td></tr>
              <tr><td>Notebook CI</td><td>${{ needs.notebook-ci.result }}</td></tr>
            </table>

            <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Workflow Run</a></p>
            <p><em>Notebook HTML report is available in the workflow artifacts.</em></p>
